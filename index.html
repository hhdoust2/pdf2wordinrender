<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مبدل PDF به متن فارسی | OCR ابری</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-color: #10b981;
            --success-hover: #059669;
        }

        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1), transparent 400px),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.05), transparent 400px);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            background: linear-gradient(to left, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-secondary);
            font-size: 13.5px;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .upload-area {
            position: relative;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            padding: 30px 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 25px;
        }

        .upload-area:hover {
            border-color: var(--accent-color);
            background: rgba(59, 130, 246, 0.05);
        }

        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 35px;
            margin-bottom: 10px;
            display: block;
        }

        .upload-text {
            color: var(--text-primary);
            font-size: 14px;
            font-weight: bold;
        }

        .upload-hint {
            color: var(--text-secondary);
            font-size: 12px;
            display: block;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background-color: var(--accent-color);
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        #status {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .error-box {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-family: monospace;
            text-align: left;
            direction: ltr;
        }

        .btn-download {
            background-color: var(--success-color);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            margin-top: 15px;
        }

        .btn-download:hover {
            background-color: var(--success-hover);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📄 سیستم استخراج متن از PDF (تاریک و شیک)</h1>
    <p>موتور هوشمند پردازش ابری اسناد فارسی</p>
    
    <div class="upload-area">
        <span class="upload-icon">📥</span>
        <span class="upload-text" id="fileLabel">کلیک کنید یا فایل PDF را اینجا رها کنید</span>
        <span class="upload-hint">حداکثر حجم پیشنهادی: ۵۰ مگابایت</span>
        <input type="file" id="pdfFile" accept=".pdf" onchange="updateFileName()">
    </div>
    
    <button onclick="startOCR()">🚀 شروع پردازش هوشمند OCR</button>
    
    <div id="status"></div>
    <div id="downloadArea"></div>
</div>

<script>
    const RENDER_API_URL = "https://pdf2word-sujy.onrender.com";

    function updateFileName() {
        const fileInput = document.getElementById('pdfFile');
        const fileLabel = document.getElementById('fileLabel');
        if (fileInput.files.length > 0) {
            fileLabel.innerText = `فایل انتخاب شده: ${fileInput.files[0].name}`;
            fileLabel.style.color = "#3b82f6";
        }
    }

    async function startOCR() {
        const fileInput = document.getElementById('pdfFile');
        const statusDiv = document.getElementById('status');
        const downloadArea = document.getElementById('downloadArea');
        
        if (fileInput.files.length === 0) { 
            alert('لطفاً ابتدا یک فایل PDF انتخاب کنید.'); 
            return; 
        }
        
        downloadArea.innerHTML = "";
        statusDiv.innerHTML = "<span style='color: #3b82f6;'>⏳ در حال اتصال به سرور و پردازش صفحات PDF... لطفاً منتظر بمانید.</span>";
        
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        
        try {
            const response = await fetch(`${RENDER_API_URL}/process-pdf`, {
                method: 'POST',
                body: formData,
                mode: 'cors'
            });
            
            if (!response.ok) {
                throw new Error(`پاسخ ناموفق از سرور ابری رندر با کد خطا: ${response.status}`);
            }
            
            const blob = await response.blob();
            const downloadUrl = window.URL.createObjectURL(blob);
            
            statusDiv.innerHTML = "<span style='color: #10b981; font-weight: bold;'>✅ فرآیند استخراج متن با موفقیت به پایان رسید!</span>";
            downloadArea.innerHTML = `
                <a href="${downloadUrl}" download="OCR_Result_${Date.now()}.txt" style="text-decoration: none;">
                    <button class="btn-download">📥 دانلود فایل متنی نهایی (TXT)</button>
                </a>`;
            
        } catch (error) {
            statusDiv.innerHTML = "<span style='color: #ef4444;'>❌ خطایی در شبکه یا پردازش رخ داد.</span>";
            statusDiv.innerHTML += `<div class="error-box">Error Details: ${error.message}</div>`;
            console.error(error);
        }
    }
</script>

</body>
</html>
